apiVersion: batch/v1
kind: Job
metadata:
  name: traffic-generator
  labels:
    app: traffic-generator
    chapter: "09"
    purpose: jaeger-tracing
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      restartPolicy: Never
      containers:
        - name: curl
          image: curlimages/curl
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting traffic generation: 100 requests to productpage..."
              i=1
              while [ $i -le 100 ]; do
                echo "Request $i/100"
                curl -s -o /dev/null -w "Status: %{http_code} | Time: %{time_total}s\n" \
                  http://productpage.default:9080/productpage
                sleep 1
                i=$((i + 1))
              done
              echo "Traffic generation complete!"
