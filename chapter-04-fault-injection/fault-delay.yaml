# ============================================================
# Chapter 04 — Fault Injection: DELAY
# ------------------------------------------------------------
# Add a 3-second delay to 100% of calls to `ratings`. Use this
# to simulate a slow dependency and verify your timeouts,
# retries and circuit breakers actually kick in.
# ============================================================
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: ratings
spec:
  hosts: [ratings]
  http:
  - fault:
      delay:
        percentage:
          value: 100         # every request...
        fixedDelay: 3s        # ...is held for 3 seconds
    route:
    - destination: { host: ratings, subset: v1 }
