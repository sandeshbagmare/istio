apiVersion: batch/v1
kind: Job
metadata:
  name: traffic-generator-kiali
  labels:
    app: traffic-generator
    chapter: "07-kiali"
spec:
  template:
    metadata:
      labels:
        app: traffic-generator
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: fortio
          image: fortio/fortio:latest
          command:
            - fortio
            - load
            - -qps
            - "5"
            - -t
            - "300s"
            - -c
            - "2"
            - -allow-initial-errors
            - http://productpage:9080/productpage
      restartPolicy: Never
  backoffLimit: 1
